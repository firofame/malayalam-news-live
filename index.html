<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Malayalam News Live</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #f8fafc;
            --muted: #a8b3c7;
            --soft: #d9e2f2;
            --page: #07090f;
            --panel: #111722;
            --line: rgba(255, 255, 255, 0.1);
            --hot: #ff4b3e;
            --hot-deep: #bd2f29;
            --mint: #42d6a4;
            --amber: #f8c35d;
            --shadow: 0 18px 44px rgba(0, 0, 0, 0.38);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--page);
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: "Anek Malayalam", "Sora", sans-serif;
            background:
                linear-gradient(150deg, rgba(99, 179, 255, 0.17), transparent 28%),
                linear-gradient(28deg, rgba(255, 75, 62, 0.2), transparent 34%),
                repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 11px),
                var(--page);
        }

        button,
        input {
            font: inherit;
        }

        button {
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            width: min(100%, 480px);
            min-height: 100vh;
            margin: 0 auto;
            padding: max(10px, env(safe-area-inset-top)) 14px max(22px, env(safe-area-inset-bottom));
        }

        .topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 2px 2px 10px;
        }

        .brand {
            min-width: 0;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: var(--mint);
            font-family: "Sora", sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--hot);
            box-shadow: 0 0 0 0 rgba(255, 75, 62, 0.68);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 75, 62, 0.68); }
            72% { box-shadow: 0 0 0 11px rgba(255, 75, 62, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 75, 62, 0); }
        }

        h1 {
            margin: 4px 0 0;
            font-family: "Sora", sans-serif;
            font-size: clamp(1.42rem, 7.2vw, 2rem);
            line-height: 1;
            letter-spacing: 0;
        }

        .clock {
            flex: 0 0 auto;
            min-width: 72px;
            margin-top: 24px;
            padding: 9px 11px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--soft);
            background: rgba(255, 255, 255, 0.06);
            font-family: "Sora", sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            text-align: center;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .player-card {
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 26px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            box-shadow: var(--shadow);
        }

        .video-shell {
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000;
        }

        .video-shell iframe,
        .poster {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .poster {
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                linear-gradient(135deg, rgba(255, 75, 62, 0.78), rgba(9, 14, 24, 0.5)),
                url("https://i.ytimg.com/vi/nObUcHKZEGY/hqdefault.jpg") center / cover;
        }

        .poster-mark {
            width: 68px;
            height: 68px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.38);
            border-radius: 999px;
            background: rgba(7, 9, 15, 0.72);
            box-shadow: 0 12px 34px rgba(0, 0, 0, 0.38);
        }

        .poster-mark svg {
            width: 30px;
            height: 30px;
            margin-left: 4px;
            fill: white;
        }

        .now-playing {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 14px;
        }

        .now-kicker {
            color: var(--amber);
            font-family: "Sora", sans-serif;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .now-title {
            margin-top: 2px;
            font-size: 1.08rem;
            font-weight: 700;
            line-height: 1.18;
        }

        .youtube-link {
            width: 46px;
            height: 46px;
            display: inline-grid;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 16px;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.07);
            text-decoration: none;
        }

        .youtube-link svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .search-strip {
            position: sticky;
            top: 0;
            z-index: 20;
            margin: 14px -14px 0;
            padding: 10px 14px 12px;
            background: linear-gradient(180deg, rgba(7, 9, 15, 0.96), rgba(7, 9, 15, 0.74));
            backdrop-filter: blur(18px);
        }

        .search-box {
            position: relative;
        }

        .search-box svg {
            position: absolute;
            top: 50%;
            left: 15px;
            width: 19px;
            height: 19px;
            color: var(--muted);
            transform: translateY(-50%);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            min-height: 52px;
            padding: 0 48px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            outline: none;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .search-input::placeholder {
            color: rgba(216, 226, 242, 0.62);
        }

        .clear-search {
            position: absolute;
            top: 50%;
            right: 7px;
            width: 38px;
            height: 38px;
            display: none;
            place-items: center;
            border: 0;
            border-radius: 13px;
            color: var(--soft);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-50%);
        }

        .clear-search.visible {
            display: grid;
        }

        .rail {
            display: flex;
            gap: 9px;
            overflow-x: auto;
            margin: 0 -14px;
            padding: 11px 14px 10px;
            scrollbar-width: none;
        }

        .rail::-webkit-scrollbar {
            display: none;
        }

        .chip {
            flex: 0 0 auto;
            min-height: 38px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            padding: 0 14px;
            color: var(--soft);
            background: rgba(255, 255, 255, 0.07);
            font-family: "Sora", sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .chip.active {
            border-color: rgba(66, 214, 164, 0.48);
            color: #07100d;
            background: var(--mint);
        }

        .feed {
            display: grid;
            gap: 12px;
            padding-top: 8px;
        }

        .channel-card {
            display: grid;
            grid-template-columns: 105px minmax(0, 1fr);
            gap: 12px;
            align-items: stretch;
            min-height: 120px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            background: rgba(17, 23, 34, 0.84);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
            overflow: hidden;
        }

        .channel-card.active {
            border-color: rgba(255, 75, 62, 0.62);
            background: linear-gradient(135deg, rgba(255, 75, 62, 0.16), rgba(23, 31, 44, 0.94));
        }

        .thumb {
            position: relative;
            min-height: 120px;
            background: #0b1018 center / cover;
        }

        .thumb::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.46));
        }

        .live-pill {
            position: absolute;
            left: 8px;
            bottom: 8px;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 24px;
            padding: 0 8px;
            border-radius: 999px;
            color: white;
            background: rgba(255, 75, 62, 0.92);
            font-family: "Sora", sans-serif;
            font-size: 0.64rem;
            font-weight: 800;
        }

        .card-copy {
            min-width: 0;
            display: flex;
            flex-direction: column;
            padding: 11px 11px 11px 0;
        }

        .card-topline {
            display: flex;
            align-items: start;
            justify-content: space-between;
            gap: 8px;
        }

        .channel-name {
            min-width: 0;
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.12;
            overflow-wrap: anywhere;
        }

        .viewer-count {
            flex: 0 0 auto;
            color: var(--mint);
            font-family: "Sora", sans-serif;
            font-size: 0.68rem;
            font-weight: 800;
        }

        .stream-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin: 7px 0 10px;
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.28;
        }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr 42px;
            gap: 8px;
            margin-top: auto;
        }

        .play-button,
        .open-button {
            min-height: 42px;
            border: 0;
            border-radius: 14px;
            cursor: pointer;
        }

        .play-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            color: white;
            background: linear-gradient(135deg, var(--hot), var(--hot-deep));
            font-family: "Sora", sans-serif;
            font-size: 0.78rem;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(255, 75, 62, 0.24);
        }

        .play-button svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
        }

        .open-button {
            display: inline-grid;
            place-items: center;
            color: var(--soft);
            background: rgba(255, 255, 255, 0.08);
            text-decoration: none;
        }

        .open-button svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .empty {
            display: none;
            margin-top: 10px;
            padding: 28px 18px;
            border: 1px dashed rgba(255, 255, 255, 0.18);
            border-radius: var(--radius);
            color: var(--muted);
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
        }

        .empty.visible {
            display: block;
        }

        @media (min-width: 620px) {
            body {
                display: flex;
                justify-content: center;
            }

            .app {
                border-inline: 1px solid rgba(255, 255, 255, 0.08);
                background: rgba(7, 9, 15, 0.54);
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="topbar">
            <div class="brand">
                <div class="eyebrow"><span class="pulse"></span>Live now</div>
                <h1>Malayalam News</h1>
            </div>
            <div class="clock" id="clock">--:--</div>
        </header>

        <section class="player-card" aria-label="Live player">
            <div class="video-shell" id="videoShell">
                <div class="poster" id="poster">
                    <div class="poster-mark" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                    </div>
                </div>
            </div>
            <div class="now-playing">
                <div>
                    <div class="now-kicker">On air</div>
                    <div class="now-title" id="nowTitle">Reporter Live</div>
                </div>
                <a class="youtube-link" id="nowExternal" href="https://www.youtube.com/watch?v=nObUcHKZEGY" target="_blank" rel="noreferrer" aria-label="Open current stream on YouTube">
                    <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </a>
            </div>
        </section>

        <section class="search-strip" aria-label="Channel search">
            <div class="search-box">
                <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"></circle><path d="m21 21-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
                <input class="search-input" id="searchInput" type="search" placeholder="Search channels" autocomplete="off">
                <button class="clear-search" id="clearSearch" type="button" aria-label="Clear search">x</button>
            </div>
        </section>

        <nav class="rail" id="quickRail" aria-label="Quick channel list"></nav>
        <section class="feed" id="feed" aria-label="Live channels"></section>
        <div class="empty" id="emptyState">No channels found.</div>
    </main>

    <script>
        const channels = [
            { name: "Reporter Live", display: "REPORTER LIVE", viewers: "24.6K", videoId: "nObUcHKZEGY", title: "Reporter TV Live 24x7 | Malayalam News Today | Kerala Breaking News Live | HD News Streaming" },
            { name: "Asianet News", display: "Asianet News", viewers: "12.1K", videoId: "s0LLVQeMmtU", title: "Asianet News Live | Malayalam Live News | Kerala News Updates | Breaking News | HD News Streaming" },
            { name: "24 News", display: "24 News", viewers: "9K", videoId: "1wECsnGZcfc", title: "24 News Live TV | Live News Updates | Malayalam News Live | HD Live Streaming | 24 News" },
            { name: "BIG TV", display: "BIG TV", viewers: "6.9K", videoId: "HRvY9DoJ_qI", title: "BigTV Official Live | Malayalam News Live | BIG TV MALAYALAM | Justice For Nurses | Nurses Strike" },
            { name: "News Malayalam 24x7", display: "News Malayalam 24x7", viewers: "4.7K", videoId: "P9MITjM250c", title: "News Malayalam 24x7 Live | ന്യൂസ് മലയാളം 24x7 | Kerala Breaking News | Malayalam News" },
            { name: "Manorama News", display: "Manorama News", viewers: "1.9K", videoId: "tgBTspqA5nY", title: "Manorama News Live | Malayalam News Live | Fifa World Cup | Liquor Policy | Latest News" },
            { name: "Mathrubhumi News", display: "Mathrubhumi News", viewers: "986", videoId: "RbxEftGN584", title: "Mathrubhumi News Live | Malayalam News Live | Kerala News Live | Breaking News Today" },
            { name: "Kairali News", display: "Kairali News", viewers: "813", videoId: "yiiqRHY1Bl8", title: "Kairali News Live | കൈരളി ന്യൂസ് ലൈവ് | Malayalam News Live | Kerala News LIVE Updates" },
            { name: "MediaOne TV", display: "MediaOne TV", viewers: "793", videoId: "-8d8-c0yvyU", title: "MediaOne TV Live | Malayalam News Live | Kerala News Live | Breaking News Today | 24x7 Live" },
            { name: "Janam TV", display: "Janam TV", viewers: "454", videoId: "T9Ol2JHqKlM", title: "Janam TV News Live | ജനം ടിവി ലൈവ് | HD Streaming | Janam Live | Janam News | Malayalam News Live TV" },
            { name: "News18 Kerala", display: "News18 Kerala", viewers: "107", videoId: "7Y-MMzEcjeA", title: "News18 Kerala 24x7 LIVE | US-Iran War | Operation Toofan | Swetha Menon | Amma Association" }
        ];

        const feed = document.getElementById("feed");
        const quickRail = document.getElementById("quickRail");
        const searchInput = document.getElementById("searchInput");
        const clearSearch = document.getElementById("clearSearch");
        const emptyState = document.getElementById("emptyState");
        const videoShell = document.getElementById("videoShell");
        const poster = document.getElementById("poster");
        const nowTitle = document.getElementById("nowTitle");
        const nowExternal = document.getElementById("nowExternal");
        const clock = document.getElementById("clock");
        let activeVideoId = channels[0].videoId;

        function youtubeWatchUrl(videoId) {
            return `https://www.youtube.com/watch?v=${videoId}`;
        }

        function youtubeEmbedUrl(videoId) {
            return `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&playsinline=1&rel=0`;
        }

        function youtubeThumbUrl(videoId) {
            return `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
        }

        function playChannel(channel, shouldScroll = true) {
            if (!channel) return;

            activeVideoId = channel.videoId;
            nowTitle.textContent = channel.display;
            nowExternal.href = youtubeWatchUrl(channel.videoId);
            videoShell.innerHTML = `<iframe title="${channel.display} live stream" src="${youtubeEmbedUrl(channel.videoId)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
            renderChannels(searchInput.value);
            renderRail();

            if (shouldScroll) {
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        }

        function renderRail() {
            quickRail.innerHTML = channels.map(channel => `
                <button class="chip ${channel.videoId === activeVideoId ? "active" : ""}" type="button" data-video-id="${channel.videoId}">
                    ${channel.display}
                </button>
            `).join("");
        }

        function renderChannels(query = "") {
            const normalizedQuery = query.trim().toLowerCase();
            const visibleChannels = channels.filter(channel => {
                const haystack = `${channel.display} ${channel.title}`.toLowerCase();
                return haystack.includes(normalizedQuery);
            });

            feed.innerHTML = visibleChannels.map(channel => `
                <article class="channel-card ${channel.videoId === activeVideoId ? "active" : ""}">
                    <div class="thumb" style="background-image: url('${youtubeThumbUrl(channel.videoId)}')">
                        <span class="live-pill"><span class="pulse"></span>LIVE</span>
                    </div>
                    <div class="card-copy">
                        <div class="card-topline">
                            <div class="channel-name">${channel.display}</div>
                            <div class="viewer-count">${channel.viewers}</div>
                        </div>
                        <div class="stream-title">${channel.title}</div>
                        <div class="card-actions">
                            <button class="play-button" type="button" data-video-id="${channel.videoId}">
                                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>
                                Play
                            </button>
                            <a class="open-button" href="${youtubeWatchUrl(channel.videoId)}" target="_blank" rel="noreferrer" aria-label="Open ${channel.display} on YouTube">
                                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                            </a>
                        </div>
                    </div>
                </article>
            `).join("");

            emptyState.classList.toggle("visible", visibleChannels.length === 0);
            clearSearch.classList.toggle("visible", normalizedQuery.length > 0);
        }

        function findChannel(videoId) {
            return channels.find(channel => channel.videoId === videoId);
        }

        function updateClock() {
            clock.textContent = new Intl.DateTimeFormat("en-IN", {
                hour: "2-digit",
                minute: "2-digit",
                hour12: false
            }).format(new Date());
        }

        feed.addEventListener("click", event => {
            const button = event.target.closest(".play-button");
            if (!button) return;
            playChannel(findChannel(button.dataset.videoId));
        });

        quickRail.addEventListener("click", event => {
            const button = event.target.closest(".chip");
            if (!button) return;
            playChannel(findChannel(button.dataset.videoId));
        });

        searchInput.addEventListener("input", event => {
            renderChannels(event.target.value);
        });

        clearSearch.addEventListener("click", () => {
            searchInput.value = "";
            searchInput.focus();
            renderChannels();
        });

        renderRail();
        renderChannels();
        updateClock();
        setInterval(updateClock, 30000);
    </script>
</body>
</html>
