<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Malayalam News Live</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #f8fafc;
            --muted: #a8b3c7;
            --soft: #d9e2f2;
            --page: #07090f;
            --panel: #111722;
            --line: rgba(255, 255, 255, 0.1);
            --hot: #ff4b3e;
            --hot-deep: #bd2f29;
            --mint: #42d6a4;
            --amber: #f8c35d;
            --shadow: 0 18px 44px rgba(0, 0, 0, 0.38);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--page);
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: "Anek Malayalam", "Sora", sans-serif;
            background:
                linear-gradient(150deg, rgba(99, 179, 255, 0.17), transparent 28%),
                linear-gradient(28deg, rgba(255, 75, 62, 0.2), transparent 34%),
                repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 11px),
                var(--page);
        }

        button,
        input {
            font: inherit;
        }

        button {
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            width: min(100%, 480px);
            min-height: 100vh;
            margin: 0 auto;
            padding: max(10px, env(safe-area-inset-top)) 14px max(90px, calc(70px + env(safe-area-inset-bottom)));
        }

        .topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 2px 2px 10px;
        }

        .brand {
            min-width: 0;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: var(--mint);
            font-family: "Sora", sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--hot);
            box-shadow: 0 0 0 0 rgba(255, 75, 62, 0.68);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 75, 62, 0.68); }
            72% { box-shadow: 0 0 0 11px rgba(255, 75, 62, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 75, 62, 0); }
        }

        h1 {
            margin: 4px 0 0;
            font-family: "Sora", sans-serif;
            font-size: clamp(1.42rem, 7.2vw, 2rem);
            line-height: 1;
            letter-spacing: 0;
        }

        .clock {
            flex: 0 0 auto;
            min-width: 72px;
            margin-top: 24px;
            padding: 9px 11px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--soft);
            background: rgba(255, 255, 255, 0.06);
            font-family: "Sora", sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            text-align: center;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .player-card {
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 26px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            box-shadow: var(--shadow);
        }

        .video-shell {
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000;
        }

        .video-shell iframe,
        .poster {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .poster {
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                linear-gradient(135deg, rgba(255, 75, 62, 0.78), rgba(9, 14, 24, 0.5)),
                url("https://i.ytimg.com/vi/nObUcHKZEGY/hqdefault.jpg") center / cover;
        }

        .poster-mark {
            width: 68px;
            height: 68px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.38);
            border-radius: 999px;
            background: rgba(7, 9, 15, 0.72);
            box-shadow: 0 12px 34px rgba(0, 0, 0, 0.38);
        }

        .poster-mark svg {
            width: 30px;
            height: 30px;
            margin-left: 4px;
            fill: white;
        }

        .youtube-link {
            width: 42px;
            height: 42px;
            display: inline-grid;
            place-items: center;
            border: 0;
            border-radius: 50%;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.1);
            text-decoration: none;
            transition: background 0.2s ease;
        }

        .youtube-link:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .youtube-link svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }



        .rail {
            display: flex;
            flex-wrap: wrap;
            gap: 9px;
            padding: 11px 0 10px;
        }

        .chip {
            min-height: 38px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            padding: 0 14px;
            color: var(--soft);
            background: rgba(255, 255, 255, 0.07);
            font-family: "Sora", sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .chip.active {
            border-color: rgba(66, 214, 164, 0.48);
            color: #07100d;
            background: var(--mint);
        }



        /* ── Floating Transport Bar ── */
        .fab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            padding: 0 14px max(14px, env(safe-area-inset-bottom));
            pointer-events: none;
        }

        .fab-transport {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 10px 20px 14px;
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 28px;
            background: rgba(13, 17, 28, 0.82);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow:
                0 -4px 30px rgba(0, 0, 0, 0.4),
                0 8px 32px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            min-width: 260px;
            max-width: 360px;
        }

        .fab-channel-name {
            color: var(--soft);
            font-family: "Sora", sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            opacity: 0.8;
            transition: opacity 0.2s ease;
        }

        .fab-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Shared button base */
        .fab-btn {
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.07);
            color: var(--ink);
            cursor: pointer;
            outline: none;
            display: grid;
            place-items: center;
            transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .fab-btn:active {
            transform: scale(0.88);
        }

        .fab-btn:hover {
            background: rgba(255, 255, 255, 0.13);
        }

        /* Skip (prev / next) buttons */
        .fab-skip {
            width: 48px;
            height: 48px;
        }

        .fab-skip svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* Center play/pause — larger */
        .fab-play-pause {
            width: 64px;
            height: 64px;
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
        }

        .fab-play-pause:hover {
            background: rgba(255, 255, 255, 0.17);
            box-shadow:
                0 6px 24px rgba(0, 0, 0, 0.35),
                0 0 0 3px rgba(66, 214, 164, 0.15);
        }

        .fab-play-pause.is-playing {
            border-color: rgba(66, 214, 164, 0.35);
        }

        .fab-play-pause.is-playing::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 999px;
            background: conic-gradient(from 0deg, transparent 0%, rgba(66, 214, 164, 0.22) 50%, transparent 100%);
            animation: fab-spin 3s linear infinite;
            z-index: -1;
        }

        @keyframes fab-spin {
            to { transform: rotate(360deg); }
        }

        .fab-icon {
            width: 28px;
            height: 28px;
            fill: currentColor;
            transition: opacity 0.15s ease, transform 0.2s ease;
        }

        .fab-icon-play,
        .fab-icon-pause {
            position: absolute;
        }

        .fab-play-pause.is-playing .fab-icon-play {
            opacity: 0;
            transform: scale(0.5);
        }

        .fab-play-pause.is-playing .fab-icon-pause {
            opacity: 1;
            transform: scale(1);
        }

        .fab-play-pause:not(.is-playing) .fab-icon-play {
            opacity: 1;
            transform: scale(1);
        }

        .fab-play-pause:not(.is-playing) .fab-icon-pause {
            opacity: 0;
            transform: scale(0.5);
        }

        /* Ripple effect on tap */
        .fab-ripple {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0);
            opacity: 1;
            pointer-events: none;
        }

        .fab-ripple.animate {
            animation: fab-ripple-anim 0.45s ease-out forwards;
        }

        @keyframes fab-ripple-anim {
            to {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        @media (min-width: 620px) {
            body {
                display: flex;
                justify-content: center;
            }

            .app {
                border-inline: 1px solid rgba(255, 255, 255, 0.08);
                background: rgba(7, 9, 15, 0.54);
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="topbar">
            <div class="brand">
                <div class="eyebrow"><span class="pulse"></span>Live now</div>
                <h1>Malayalam News</h1>
            </div>
            <div class="clock" id="clock">--:--</div>
        </header>

        <section class="player-card" aria-label="Live player">
            <div class="video-shell" id="videoShell">
                <div class="poster" id="poster">
                    <div class="poster-mark" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                    </div>
                </div>
            </div>

        </section>



        <nav class="rail" id="quickRail" aria-label="Quick channel list"></nav>

    </main>

    <!-- Floating Transport Bar -->
    <div class="fab-bar">
        <div class="fab-transport">
            <span class="fab-channel-name" id="fabChannelName">REPORTER LIVE</span>
            <div class="fab-controls">
                <a class="youtube-link" id="fabExternal" href="https://www.youtube.com/watch?v=nObUcHKZEGY" target="_blank" rel="noreferrer" aria-label="Open on YouTube">
                    <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </a>
                <button class="fab-btn fab-skip" id="fabPrev" type="button" aria-label="Previous channel">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"></path></svg>
                    <span class="fab-ripple"></span>
                </button>
                <button class="fab-btn fab-play-pause" id="fabPlayPause" type="button" aria-label="Play stream">
                    <svg class="fab-icon fab-icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                    <svg class="fab-icon fab-icon-pause" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect></svg>
                    <span class="fab-ripple" id="fabRipple"></span>
                </button>
                <button class="fab-btn fab-skip" id="fabNext" type="button" aria-label="Next channel">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"></path></svg>
                    <span class="fab-ripple"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const channels = [
            { display: "REPORTER LIVE", videoId: "nObUcHKZEGY" },
            { display: "Asianet News", videoId: "s0LLVQeMmtU" },
            { display: "24 News", videoId: "1wECsnGZcfc" },
            { display: "BIG TV", videoId: "HRvY9DoJ_qI" },
            { display: "News Malayalam 24x7", videoId: "P9MITjM250c" },
            { display: "Manorama News", videoId: "tgBTspqA5nY" },
            { display: "Mathrubhumi News", videoId: "RbxEftGN584" },
            { display: "Kairali News", videoId: "yiiqRHY1Bl8" },
            { display: "MediaOne TV", videoId: "-8d8-c0yvyU" },
            { display: "Janam TV", videoId: "T9Ol2JHqKlM" },
            { display: "News18 Kerala", videoId: "7Y-MMzEcjeA" }
        ];

        const quickRail = document.getElementById("quickRail");

        const videoShell = document.getElementById("videoShell");
        const poster = document.getElementById("poster");
        const clock = document.getElementById("clock");
        const fabExternal = document.getElementById("fabExternal");
        let activeVideoId = channels[0].videoId;

        function youtubeWatchUrl(videoId) {
            return `https://www.youtube.com/watch?v=${videoId}`;
        }

        function youtubeEmbedUrl(videoId) {
            return `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&playsinline=1&rel=0`;
        }

        function playChannel(channel, shouldScroll = true) {
            if (!channel) return;

            activeVideoId = channel.videoId;
            fabExternal.href = youtubeWatchUrl(channel.videoId);
            videoShell.innerHTML = `<iframe title="${channel.display} live stream" src="${youtubeEmbedUrl(channel.videoId)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
            renderRail();

            if (shouldScroll) {
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        }

        function renderRail() {
            quickRail.innerHTML = channels.map(channel => `
                <button class="chip ${channel.videoId === activeVideoId ? "active" : ""}" type="button" data-video-id="${channel.videoId}">
                    ${channel.display}
                </button>
            `).join("");
        }

        function findChannel(videoId) {
            return channels.find(channel => channel.videoId === videoId);
        }

        function updateClock() {
            clock.textContent = new Intl.DateTimeFormat("en-IN", {
                hour: "2-digit",
                minute: "2-digit",
                hour12: false
            }).format(new Date());
        }


        quickRail.addEventListener("click", event => {
            const button = event.target.closest(".chip");
            if (!button) return;
            playChannel(findChannel(button.dataset.videoId));
        });



        renderRail();
        updateClock();
        setInterval(updateClock, 30000);

        /* ── Transport Bar logic ── */
        const fabBtn = document.getElementById("fabPlayPause");
        const fabRipple = document.getElementById("fabRipple");
        const fabPrev = document.getElementById("fabPrev");
        const fabNext = document.getElementById("fabNext");
        const fabChannelName = document.getElementById("fabChannelName");
        let isPlaying = false;

        function getActiveIndex() {
            return channels.findIndex(ch => ch.videoId === activeVideoId);
        }

        function updateFabState() {
            if (isPlaying) {
                fabBtn.classList.add("is-playing");
                fabBtn.setAttribute("aria-label", "Pause stream");
            } else {
                fabBtn.classList.remove("is-playing");
                fabBtn.setAttribute("aria-label", "Play stream");
            }
            // Update channel name and YouTube link in transport bar
            const ch = findChannel(activeVideoId);
            if (ch) {
                fabChannelName.textContent = ch.display;
                fabExternal.href = youtubeWatchUrl(ch.videoId);
            }
        }

        function triggerRipple(btn) {
            const ripple = btn.querySelector(".fab-ripple");
            if (!ripple) return;
            ripple.classList.remove("animate");
            void ripple.offsetWidth;
            ripple.classList.add("animate");
        }

        function goNext() {
            const idx = getActiveIndex();
            const nextIdx = (idx + 1) % channels.length;
            playChannel(channels[nextIdx], false);
        }

        function goPrev() {
            const idx = getActiveIndex();
            const prevIdx = (idx - 1 + channels.length) % channels.length;
            playChannel(channels[prevIdx], false);
        }

        fabBtn.addEventListener("click", () => {
            triggerRipple(fabBtn);
            if (isPlaying) {
                const iframe = videoShell.querySelector("iframe");
                if (iframe) iframe.remove();
                const posterEl = document.createElement("div");
                posterEl.className = "poster";
                posterEl.id = "poster";
                posterEl.innerHTML = '<div class="poster-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg></div>';
                videoShell.appendChild(posterEl);
                isPlaying = false;
            } else {
                const ch = findChannel(activeVideoId);
                if (ch) playChannel(ch, false);
                isPlaying = true;
            }
            updateFabState();
        });

        fabPrev.addEventListener("click", () => {
            triggerRipple(fabPrev);
            goPrev();
        });

        fabNext.addEventListener("click", () => {
            triggerRipple(fabNext);
            goNext();
        });

        // Keep transport bar in sync when channels are switched via chips
        const origPlayChannel = playChannel;
        playChannel = function(channel, shouldScroll = true) {
            origPlayChannel(channel, shouldScroll);
            isPlaying = true;
            updateFabState();
        };

        updateFabState();
    </script>
</body>
</html>
